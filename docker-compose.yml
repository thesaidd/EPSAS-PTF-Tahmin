name: pepias-ptf-forecasting

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pepias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pepias}
      POSTGRES_DB: ${POSTGRES_DB:-pepias}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pepias} -d ${POSTGRES_DB:-pepias}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-EPİAŞ PTF Forecasting MVP}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://pepias:pepias@db:5432/pepias}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      target: dashboard
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-http://api:8000}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy

  mlflow:
    build:
      context: .
      target: mlflow
    restart: unless-stopped
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - ${MLFLOW_BACKEND_STORE_URI:-postgresql+psycopg://pepias:pepias@db:5432/pepias}
      - --artifacts-destination
      - /mlartifacts
      - --serve-artifacts
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_artifacts:/mlartifacts
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  mlflow_artifacts:
