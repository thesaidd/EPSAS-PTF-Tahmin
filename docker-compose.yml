name: pepias-ptf-forecasting

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pepias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pepias}
      POSTGRES_DB: ${POSTGRES_DB:-pepias}
      MLFLOW_DATABASE: ${MLFLOW_DATABASE:-mlflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pepias} -d ${POSTGRES_DB:-pepias}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    image: timescale/timescaledb:latest-pg16
    restart: "no"
    environment:
      PGHOST: db
      PGPASSWORD: ${POSTGRES_PASSWORD:-pepias}
      POSTGRES_USER: ${POSTGRES_USER:-pepias}
      POSTGRES_DB: ${POSTGRES_DB:-pepias}
      MLFLOW_DATABASE: ${MLFLOW_DATABASE:-mlflow}
    volumes:
      - ./app/db/migrations:/docker-entrypoint-initdb.d:ro
    command:
      - sh
      - /docker-entrypoint-initdb.d/000_create_mlflow_database.sh
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-EPİAŞ PTF Forecasting MVP}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://pepias:pepias@db:5432/pepias}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      EPIAS_BASE_URL: ${EPIAS_BASE_URL:-https://seffaflik.epias.com.tr}
      EPIAS_AUTH_URL: ${EPIAS_AUTH_URL:-https://giris.epias.com.tr}
      EPIAS_USERNAME: ${EPIAS_USERNAME:-}
      EPIAS_PASSWORD: ${EPIAS_PASSWORD:-}
      EPIAS_REQUEST_TIMEOUT: ${EPIAS_REQUEST_TIMEOUT:-30}
      EPIAS_MAX_RETRIES: ${EPIAS_MAX_RETRIES:-3}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      target: dashboard
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-http://api:8000}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy

  mlflow:
    build:
      context: .
      target: mlflow
    restart: unless-stopped
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - ${MLFLOW_BACKEND_STORE_URI:-postgresql+psycopg2://pepias:pepias@db:5432/mlflow}
      - --artifacts-destination
      - /mlartifacts
      - --serve-artifacts
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_artifacts:/mlartifacts
    depends_on:
      mlflow-db-upgrade:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow-db-upgrade:
    build:
      context: .
      target: mlflow
    restart: "no"
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI:-postgresql+psycopg2://pepias:pepias@db:5432/mlflow}
    command:
      - python
      - scripts/prepare_mlflow_database.py
    depends_on:
      db-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  mlflow_artifacts:
